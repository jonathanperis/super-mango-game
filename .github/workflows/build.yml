name: Build & Release

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   push → main    builds the game AND creates a versioned GitHub Release.
#   pull_request   builds the game as a check only; no release is created.
#
# This means:
#   • Every PR from a feature branch gets a build check (the "build" job).
#   • Every merge/push to main gets a build check AND a new release (the
#     "release" job), versioned as v0.0.<run_number>.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:
jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # BUILD JOB
  # Compiles the game on Linux (x86_64), macOS (arm64), Windows (x86_64),
  # and WebAssembly in parallel.
  # Runs on every push to main AND every pull request.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # let all platforms finish even if one fails
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux x86_64
            artifact: super-mango-linux-x86_64
            target: native
          - os: macos-latest
            platform: macOS arm64
            artifact: super-mango-macos-arm64
            target: native
          - os: windows-latest
            platform: Windows x86_64
            artifact: super-mango-windows-x86_64
            target: native
          - os: ubuntu-latest
            platform: WebAssembly
            artifact: super-mango-wasm
            target: wasm

    steps:
      # Check out the repository so the runner has access to the source code.
      - name: Checkout source
        uses: actions/checkout@v6

      # ── Linux dependency install ────────────────────────────────────────────
      # apt packages: build tools + SDL2 and all companion library dev headers.
      - name: Install dependencies (Linux)
        if: matrix.target == 'native' && runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      # ── macOS dependency install ────────────────────────────────────────────
      # Homebrew is pre-installed on macOS GitHub runners.
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_image sdl2_ttf sdl2_mixer

      # ── Windows dependency install ──────────────────────────────────────────
      # MSYS2 is pre-installed on windows-latest runners. We use the
      # msys2/setup-msys2 action to configure the UCRT64 environment and
      # install MinGW-w64 gcc, make, and all SDL2 companion packages.
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            mingw-w64-ucrt-x86_64-gcc
            make
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-SDL2_ttf
            mingw-w64-ucrt-x86_64-SDL2_mixer

      # ── Emscripten SDK install (WebAssembly) ────────────────────────────────
      # Provides emcc, the C-to-WebAssembly compiler. SDL2 ports are compiled
      # from source by Emscripten automatically via -s USE_SDL=2 flags.
      - name: Install Emscripten SDK
        if: matrix.target == 'wasm'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify Emscripten
        if: matrix.target == 'wasm'
        run: emcc --version

      # ── Compile (Linux / macOS) ─────────────────────────────────────────────
      # Produces out/super-mango via the project Makefile.
      - name: Build (Linux / macOS)
        if: matrix.target == 'native' && runner.os != 'Windows'
        run: make

      # ── Compile (Windows) ───────────────────────────────────────────────────
      # The msys2 shell is required so the UCRT64 toolchain and sdl2-config
      # are on PATH. We pass CC=gcc and override the output name to include
      # the .exe extension.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make CC=gcc

      # ── Compile (WebAssembly) ───────────────────────────────────────────────
      # Uses the 'web' Makefile target with emcc. Assets are bundled into
      # the .data file via --preload-file.
      - name: Build (WebAssembly)
        if: matrix.target == 'wasm'
        run: make web

      # ── Bundle SDL2 DLLs for Windows ────────────────────────────────────────
      # On Windows, SDL2 is dynamically linked. The DLLs must ship alongside
      # the .exe or it will fail to start on any machine without SDL2 installed.
      # We copy every SDL2*.dll from the UCRT64 bin directory into out/.
      - name: Bundle SDL2 DLLs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cp /ucrt64/bin/SDL2*.dll out/

      # ── Rename .exe for upload (Windows) ────────────────────────────────────
      # The Makefile produces "super-mango" on all platforms; on Windows the
      # linker names it "super-mango.exe". We normalise the name here so the
      # upload-artifact path is consistent.
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: mv out/super-mango.exe out/super-mango

      # Upload the compiled binary (and, on Windows, the DLLs) as a workflow
      # artifact. retention-days: 1 keeps storage low for PR build checks.
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # RELEASE JOB
  # Runs ONLY when a commit is pushed to main (not on pull_request events).
  # Waits for all four build matrix legs to succeed, then creates a GitHub
  # Release tagged v0.0.<run_number> with all platform binaries attached.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    # Guard: skip this job entirely for pull_request events and non-main pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # The GITHUB_TOKEN must have write access to repository contents to create
    # tags and releases. Scoping it here follows the principle of least privilege.
    permissions:
      contents: write

    steps:
      # Download each platform's artifact into its own subdirectory so files
      # with the same name ("super-mango") don't overwrite each other.
      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: super-mango-linux-x86_64
          path: dist/linux/

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: super-mango-macos-arm64
          path: dist/macos/

      - name: Download Windows binary
        uses: actions/download-artifact@v8
        with:
          name: super-mango-windows-x86_64
          path: dist/windows/

      - name: Download WebAssembly build
        uses: actions/download-artifact@v8
        with:
          name: super-mango-wasm
          path: dist/wasm/

      # Rename platform binaries and zip bundles for release upload.
      - name: Prepare release assets
        run: |
          mv dist/linux/super-mango  dist/super-mango-linux-x86_64
          mv dist/macos/super-mango  dist/super-mango-macos-arm64
          chmod +x dist/super-mango-linux-x86_64 dist/super-mango-macos-arm64
          cd dist/windows
          mv super-mango super-mango.exe
          zip -r ../super-mango-windows-x86_64.zip .
          cd ../wasm
          zip -r ../super-mango-wasm.zip .

      # Create the GitHub Release. The tag is auto-created by the action.
      # softprops/action-gh-release picks up GITHUB_TOKEN automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.0.${{ github.run_number }}"
          name: "Super Mango v0.0.${{ github.run_number }}"
          body: |
            Automated release built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ### Downloads

            | Platform        | File                                  | Notes                              |
            |-----------------|---------------------------------------|------------------------------------|
            | Linux x86_64    | `super-mango-linux-x86_64`            | Run from repo root                 |
            | macOS arm64     | `super-mango-macos-arm64`             | Run from repo root                 |
            | Windows x86_64  | `super-mango-windows-x86_64.zip`      | Extract zip; SDL2 DLLs are included|
            | WebAssembly     | `super-mango-wasm.zip`                | Serve with any HTTP server         |

            > **Note:** Native binaries must be run from the repository root so they can find the `assets/` folder. The WebAssembly build bundles assets into the `.data` file.
          files: |
            dist/super-mango-linux-x86_64
            dist/super-mango-macos-arm64
            dist/super-mango-windows-x86_64.zip
            dist/super-mango-wasm.zip
          fail_on_unmatched_files: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEPLOY GITHUB PAGES
  # Runs ONLY when a commit is pushed to main (not on pull_request events).
  # Combines the static docs/ site with the WebAssembly build artifacts
  # and deploys to GitHub Pages so the game is playable in the browser.
  # ────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Check out the repository to get the docs/ folder.
      - name: Checkout source
        uses: actions/checkout@v6

      # Download the WebAssembly build artifacts (super-mango.html, .js,
      # .wasm, .data) produced by the build job's "make web" step.
      - name: Download WebAssembly build
        uses: actions/download-artifact@v8
        with:
          name: super-mango-wasm
          path: wasm-build/

      # Build the Next.js docs site (static export to docs/out/).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build docs site
        run: npm run build
        working-directory: docs
        env:
          PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      # Layer the WASM files into the built docs site so the JS loader
      # can find them at the site root (alongside index.html).
      - name: Copy WASM artifacts into docs output
        run: |
          cp wasm-build/super-mango.js   docs/out/
          cp wasm-build/super-mango.wasm docs/out/
          cp wasm-build/super-mango.data docs/out/
          cp wasm-build/super-mango-debug.html docs/out/ 2>/dev/null || true
          cp wasm-build/super-mango-debug.js   docs/out/ 2>/dev/null || true
          cp wasm-build/super-mango-debug.wasm docs/out/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
