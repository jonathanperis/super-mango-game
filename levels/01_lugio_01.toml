Difficulty 4 - The mountain opened its throat and swallowed the sky.
Eight screens of molten stone, choking smoke, and fire that never rests.
Every gap belches flame. Every platform floats above a river of lava.
The smoke rolls thick — you won't see the spiders until they're on you.
This is the forge where platformers are made or broken. Survive the
depths, reach the star, and earn the right to say you walked through
fire.

This is the first level in the Volcanic Depths series. The path
continues deeper 
"""
