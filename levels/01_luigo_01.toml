# Level: Volcanic Depths
#
# A descent into the heart of a volcano. You start at the cave mouth where
# stone pillars rise from cooling rock, spiders patrol the shadows, and the
# air is thick with heat. Push deeper — lava pits open beneath your feet,
# fire flames erupt from every gap, and spinning axes guard the narrow
# passages. The deeper you go, the tighter the platforms, the faster the
# enemies. In the furnace at the end, only a red bouncepad can launch you
# high enough to reach the last star perched atop the tallest pillar.
# Don't look down. The lava doesn't forgive.
#
# Generated by Luigo, the Creator.
# Theme: Cave/Lava | Difficulty: Medium | Screens: 8
